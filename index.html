<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PAGASKA Birthday Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#ffd700;--gold-mid:#c8960c;--gold-dark:#7a5500;--gold-deeper:#3d2900}
body{background:#0e0c0a;font-family:'EB Garamond',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px;gap:32px}
.form-panel{width:100%;max-width:480px;background:#16120d;border:1px solid var(--gold-dark);border-radius:12px;padding:28px;box-shadow:0 0 40px rgba(200,150,12,.07)}
.form-panel h2{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);text-align:center;letter-spacing:4px;margin-bottom:6px}
.form-panel .sub{text-align:center;font-size:13px;color:#666;margin-bottom:24px;font-style:italic}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
label{display:block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold-mid);margin-bottom:5px}
input{width:100%;background:#0a0806;border:1px solid #2e2000;border-radius:6px;padding:9px 13px;font-family:'EB Garamond',serif;font-size:15px;color:#ddd;outline:none;transition:border-color .2s}
input:focus{border-color:var(--gold-mid)}
input::placeholder{color:#333;font-style:italic}
.photo-upload{position:relative;border:2px dashed #2e2000;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.photo-upload:hover{border-color:var(--gold-mid)}
.photo-upload input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-preview{width:72px;height:72px;border-radius:6px;object-fit:cover;border:1px solid var(--gold-dark);display:none}
.upload-label{font-size:12px;color:#555;pointer-events:none;font-style:italic}
.btn-generate{width:100%;background:linear-gradient(135deg,#3d2900,#7a5500,#ffd700,#7a5500,#3d2900);background-size:300% 300%;animation:shimmer 4s ease infinite;border:none;border-radius:8px;padding:13px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:4px;color:#0a0600;cursor:pointer;margin-top:18px;transition:transform .15s,box-shadow .15s}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,215,0,.2)}
@keyframes shimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.btn-download{width:100%;background:transparent;border:1px solid var(--gold-dark);border-radius:8px;padding:10px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold-mid);cursor:pointer;margin-top:8px;transition:background .2s;display:none}
.btn-download:hover{background:rgba(200,150,12,.08);color:var(--gold)}
.poster-wrap{position:relative}
#poster-canvas{display:none;max-width:100%;box-shadow:0 20px 80px rgba(0,0,0,.9),0 0 50px rgba(200,150,12,.05)}
.placeholder{width:360px;max-width:100%;aspect-ratio:9/16;background:#0a0806;border:1px solid #1a1510;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.placeholder span{font-size:40px;opacity:.2}
.placeholder p{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:#333}
</style>
</head>
<body>

<div class="form-panel">
  <h2>✦ PAGASKA ✦</h2>
  <div class="sub">Generator Kartu Ulang Tahun</div>
  <div class="form-grid">
    <div class="full">
      <label>FOTO ANGGOTA</label>
      <div class="photo-upload">
        <input type="file" id="photoInput" accept="image/*">
        <img class="upload-preview" id="photoPreview" alt="">
        <div class="upload-label" id="uploadLabel">Klik untuk upload foto</div>
      </div>
    </div>
    <div class="full">
      <label>NAMA LENGKAP</label>
      <input type="text" id="inputNama" placeholder="cth. Rizky Indra Permana" maxlength="30">
    </div>
    <div>
      <label>JABATAN</label>
      <input type="text" id="inputJabatan" placeholder="cth. Ketua Umum" maxlength="22">
    </div>
    <div>
      <label>GENERASI</label>
      <input type="text" id="inputGenerasi" placeholder="cth. 2" maxlength="5">
    </div>
    <div class="full">
      <label>TANGGAL LAHIR</label>
      <input type="text" id="inputTTL" placeholder="cth. 8 Juni 2007" maxlength="20">
    </div>
  </div>
  <button class="btn-generate" onclick="generatePoster()">GENERATE POSTER</button>
  <button class="btn-download" id="btnDownload" onclick="downloadPoster()">↓ DOWNLOAD PNG</button>
</div>

<div class="poster-wrap">
  <div class="placeholder" id="placeholder">
    <span>✦</span>
    <p>PREVIEW POSTER</p>
  </div>
  <canvas id="poster-canvas" width="1080" height="1920"></canvas>
</div>

<script>
const W=1080,H=1920;
let memberPhoto=null,kakImg=null,dokterImg=null;

function loadImg(src){
  return new Promise(res=>{
    const i=new Image();i.crossOrigin='anonymous';
    i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;
  });
}
Promise.all([loadImg('kak.png'),loadImg('dokter.png')])
  .then(([k,d])=>{kakImg=k;dokterImg=d;});

document.getElementById('photoInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      memberPhoto=img;
      const prev=document.getElementById('photoPreview');
      prev.src=ev.target.result;prev.style.display='block';
      document.getElementById('uploadLabel').textContent=file.name;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── canvas utils ──────────────────────────────────────────
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function goldGrad(ctx,x1,y1,x2,y2){
  const g=ctx.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0,'#2a1800');g.addColorStop(0.25,'#c8960c');
  g.addColorStop(0.5,'#fffacd');g.addColorStop(0.75,'#ffd700');g.addColorStop(1,'#2a1800');
  return g;
}
function goldLine(ctx,x,y,w,alpha=1,h=2.5){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle=goldGrad(ctx,x,y,x+w,y);ctx.fillRect(x,y,w,h);ctx.restore();
}
function goldBorder(ctx,x,y,w,h,r,lw=2){
  ctx.save();ctx.strokeStyle=goldGrad(ctx,x,y,x+w,y+h);ctx.lineWidth=lw;
  rr(ctx,x,y,w,h,r);ctx.stroke();ctx.restore();
}
function glow(ctx,col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function noGlow(ctx){ctx.shadowColor='transparent';ctx.shadowBlur=0;}

function drawImgCover(ctx,img,x,y,w,h,r,posY=0.12){
  ctx.save();rr(ctx,x,y,w,h,r);ctx.clip();
  if(img){
    const iR=img.width/img.height,bR=w/h;
    let dw,dh,dx,dy;
    if(iR>bR){dh=h;dw=dh*iR;dx=x+(w-dw)/2;dy=y;}
    else{dw=w;dh=dw/iR;dx=x;dy=y+(h-dh)*posY;}
    ctx.drawImage(img,dx,dy,dw,dh);
  }else{
    ctx.fillStyle='#1a1208';ctx.fillRect(x,y,w,h);
    ctx.font='80px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#3d2900';ctx.fillText('?',x+w/2,y+h/2);
  }
  ctx.restore();
}

function wrapText(ctx,text,maxW){
  const words=text.split(' '),lines=[];let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW){if(cur)lines.push(cur);cur=w;}else cur=t;
  }
  if(cur)lines.push(cur);return lines;
}

// ── SVG icons as off-screen canvas ────────────────────────
// Each returns a promise of a drawn canvas/image at given size
function svgToImg(svgStr,size){
  return new Promise(res=>{
    const blob=new Blob([svgStr],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const c=document.createElement('canvas');c.width=size;c.height=size;
      const cx=c.getContext('2d');cx.drawImage(img,0,0,size,size);
      res(c);
    };
    img.src=url;
  });
}

// SVG icon definitions — gold filled, no emoji dependency
const ICONS={
  crown:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M2 19h20v2H2v-2zm18-9l-4 4-4-6-4 6-4-4-2 7h20l-2-7z"/>
  </svg>`,

  star:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </svg>`,

  run:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <circle fill="${col}" cx="13.5" cy="3.5" r="2"/>
    <path fill="${col}" d="M10 9.09l2.45 2.27L14 13h4v-2h-3l-1.73-2.27 3.23-1.8L14.27 5 11 6.5 8 7l-.36 3h2.18L10 9.09zM5 21.5l4-1.5 1-2.5 2 2H15v-2h-2.5l-2-2L9 17.5l-4 1.5V21.5z"/>
  </svg>`,

  flame:(col='#ff6b2b')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M12 23a7 7 0 01-7-7c0-2.05.83-3.9 2.17-5.25C8.45 9.4 9 7.76 9 6c0-.83.18-1.6.5-2.3C11.2 5.07 12 7.45 12 9.5c0 1.38-.56 2.63-1.46 3.54A4.98 4.98 0 0119 16a7 7 0 01-7 7z"/>
  </svg>`,

  shield:(col='#6eb5ff')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4z"/>
  </svg>`,

  people:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
  </svg>`,

  book:(col='#c8960c')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9l-2.5-1.5L12 11V3h5v8z"/>
  </svg>`,

  calendar:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M20 3h-1V1h-2v2H7V1H5v2H4C2.9 3 2 3.9 2 5v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zM9 14H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
  </svg>`,

  cake:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M12 6c1.11 0 2-.89 2-2 0-.55-.23-1.05-.59-1.41L12 1l-1.41 1.59C10.23 2.95 10 3.45 10 4c0 1.11.89 2 2 2zm4.6 9.99l-1.07-1.07-1.08 1.07c-1.3 1.3-3.58 1.31-4.89 0l-1.07-1.07-1.09 1.07C6.75 16.64 5.88 17 4.96 17c-.73 0-1.4-.23-1.96-.61V21c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-4.61c-.56.38-1.23.61-1.96.61-.92 0-1.79-.36-2.44-1.01zM20 7H4c-1.1 0-2 .9-2 2v2.96c0 1.15.95 2.04 2.1 1.99.5-.02.99-.23 1.32-.57l2.13-2.14 2.13 2.13c.74.74 2.05.74 2.79 0l2.14-2.13 2.13 2.13c.33.34.82.55 1.32.57 1.15.05 2.1-.85 2.1-2V9c0-1.1-.9-2-2-2z"/>
  </svg>`,

  chat:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
  </svg>`,

  sparkle:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M12 1l2.5 7.5H22l-6.5 4.5 2.5 7.5L12 16l-6 4.5 2.5-7.5L2 8.5h7.5L12 1z"/>
  </svg>`,

  diamond:(col='#ffd700')=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="${col}" d="M19 3H5L1 9l11 13L23 9l-4-6zm-7 13L4.21 9.79 7.54 5h8.92l3.33 4.79L12 16z"/>
  </svg>`,
};

// Pre-render icon cache
const iconCache={};
async function getIcon(name,size,col){
  const key=`${name}_${size}_${col||'def'}`;
  if(!iconCache[key]){
    const fn=ICONS[name];if(!fn)return null;
    iconCache[key]=await svgToImg(fn(col),size);
  }
  return iconCache[key];
}

// Draw icon centered at (cx, cy)
async function drawIcon(ctx,name,size,cx,cy,col){
  const ic=await getIcon(name,size,col);
  if(ic)ctx.drawImage(ic,cx-size/2,cy-size/2,size,size);
}

// ── greetings stubs ───────────────────────────────────────
function getKakGreeting(nama,jabatan,gen){
  return `Selamat ulang tahun, ${nama}! Semoga langkahmu di Pagaska selalu mantap, membawa perubahan positif, dan menjadi teladan bagi generasi penerus.`;
}
function getDokterGreeting(nama,jabatan,gen){
  return `Selamat ulang tahun, ${nama}. Semoga selalu diberi kesehatan, kelancaran dalam setiap rencana, dan keberkahan di setiap usaha.`;
}

// ── MAIN ──────────────────────────────────────────────────
async function generatePoster(){
  const nama     = document.getElementById('inputNama').value.trim()    || 'Nama Lengkap';
  const jabatan  = document.getElementById('inputJabatan').value.trim() || 'Jabatan';
  const generasi = document.getElementById('inputGenerasi').value.trim()|| '-';
  const ttl      = document.getElementById('inputTTL').value.trim()     || '—';
  const kakMsg   = getKakGreeting(nama,jabatan,generasi);
  const dokMsg   = getDokterGreeting(nama,jabatan,generasi);

  const canvas=document.getElementById('poster-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // 1. BACKGROUND
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#07070d');bg.addColorStop(0.42,'#130500');bg.addColorStop(1,'#060010');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  function ambient(cx,cy,r,col,a){
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0,col);rg.addColorStop(1,'transparent');
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle=rg;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  ambient(160,380,420,'#ff1100',0.025);
  ambient(920,820,340,'#ffd700',0.020);
  ambient(540,1400,560,'#6b0000',0.030);

  const PAD=44;
  goldLine(ctx,PAD,42,W-PAD*2,1,3);
  goldLine(ctx,PAD,48,W-PAD*2,0.28,1);

  // 2. HEADER
  ctx.textAlign='center';ctx.textBaseline='alphabetic';

  // diamond icons flanking PAGASKA
  await drawIcon(ctx,'diamond',36,W/2-200,92,'#c8960c');
  await drawIcon(ctx,'diamond',36,W/2+200,92,'#c8960c');

  ctx.font="700 36px 'Cinzel Decorative',serif";
  ctx.fillStyle='#c8960c';
  glow(ctx,'#c8960c',18);
  ctx.fillText('PAGASKA',W/2,110);
  noGlow(ctx);

  ctx.font="400 22px 'EB Garamond',serif";
  ctx.fillStyle='#aaaaaa';
  ctx.fillText('Paskibra Gala Taksaka',W/2,146);

  // crown icons flanking HBD
  await drawIcon(ctx,'crown',40,W/2-260,178,'#ffd700');
  await drawIcon(ctx,'crown',40,W/2+260,178,'#ffd700');

  ctx.font="700 33px 'Cinzel',serif";
  ctx.fillStyle='#ffd700';
  glow(ctx,'#ffd700',20);
  ctx.fillText('Selamat Ulang Tahun',W/2,194);
  noGlow(ctx);

  goldLine(ctx,200,212,W-400,0.45);

  // 3. MEMBER PHOTO
  const FW=420,FH=458,FR=22;
  const FX=(W-FW)/2,FY=230;
  drawImgCover(ctx,memberPhoto,FX,FY,FW,FH,FR,0.1);

  const BP=11,BR=FR+7;
  ctx.save();
  glow(ctx,'#c8960c',20);
  ctx.strokeStyle=goldGrad(ctx,FX-BP,FY-BP,FX+FW+BP,FY+FH+BP);
  ctx.lineWidth=3.5;
  rr(ctx,FX-BP,FY-BP,FW+BP*2,FH+BP*2,BR);ctx.stroke();
  noGlow(ctx);
  ctx.strokeStyle='rgba(255,250,205,0.22)';ctx.lineWidth=1;
  rr(ctx,FX-BP+5,FY-BP+5,FW+BP*2-10,FH+BP*2-10,BR-4);ctx.stroke();
  ctx.restore();

  const AFTER_FOTO=FY+FH+BP+4; // ~703

  // 4. GENERASI
  ctx.font="italic 400 24px 'EB Garamond',serif";
  ctx.fillStyle='#888';
  ctx.fillText('Generasi: '+generasi,W/2,AFTER_FOTO+34);
  goldLine(ctx,220,AFTER_FOTO+44,W-440,0.35);

  // 5. NAME BOX
  const NB_Y=AFTER_FOTO+62;
  const NB_H=162,NB_X=56,NB_W=W-112,NB_R=10;

  rr(ctx,NB_X,NB_Y,NB_W,NB_H,NB_R);
  ctx.fillStyle='rgba(8,6,4,0.88)';ctx.fill();
  goldBorder(ctx,NB_X,NB_Y,NB_W,NB_H,NB_R,2);
  ctx.save();ctx.strokeStyle='rgba(90,60,0,0.28)';ctx.lineWidth=1;
  rr(ctx,NB_X+6,NB_Y+6,NB_W-12,NB_H-12,NB_R-3);ctx.stroke();ctx.restore();

  ctx.font="600 15px 'Cinzel',serif";
  ctx.fillStyle='#5a3d00';
  ctx.fillText('NAMA LENGKAP',W/2,NB_Y+28);

  let nfs=66;
  ctx.font=`900 ${nfs}px 'Cinzel',serif`;
  while(ctx.measureText(nama.toUpperCase()).width>NB_W-80&&nfs>28){
    nfs-=2;ctx.font=`900 ${nfs}px 'Cinzel',serif`;
  }
  const nameGrad=ctx.createLinearGradient(NB_X+40,0,NB_X+NB_W-40,0);
  nameGrad.addColorStop(0,'#cc1111');nameGrad.addColorStop(0.5,'#ffd700');nameGrad.addColorStop(1,'#cc1111');
  ctx.fillStyle=nameGrad;
  glow(ctx,'#aa1111',14);
  ctx.fillText(nama.toUpperCase(),W/2,NB_Y+94);
  noGlow(ctx);

  goldLine(ctx,NB_X+50,NB_Y+106,NB_W-100,0.3,1);

  ctx.font="400 20px 'EB Garamond',serif";
  ctx.fillStyle='#777';
  ctx.fillText('Jabatan',W/2,NB_Y+126);

  let jfs=32;
  ctx.font=`600 ${jfs}px 'Cinzel',serif`;
  while(ctx.measureText(jabatan.toUpperCase()).width>NB_W-80&&jfs>18){
    jfs-=2;ctx.font=`600 ${jfs}px 'Cinzel',serif`;
  }
  ctx.fillStyle='#ffffff';
  ctx.fillText(jabatan.toUpperCase(),W/2,NB_Y+157);

  // 6. ICON ROW  — SVG icons instead of emoji
  const IC_CY=NB_Y+NB_H+58;
  const rowIcons=[
    ['run','#ffd700'],['flame','#ff6b2b'],['shield','#6eb5ff'],
    ['people','#ffd700'],['book','#c8960c']
  ];
  const iSz=52,iSp=96,iTot=rowIcons.length*iSp;
  let ix=(W-iTot)/2+iSp/2;
  for(const [name,col] of rowIcons){
    await drawIcon(ctx,name,iSz,ix,IC_CY,col);
    ix+=iSp;
  }

  goldLine(ctx,44,IC_CY+42,W-88,0.32);

  // 7. MASCOTS
  const ML_Y=IC_CY+76;
  const MB_Y=ML_Y+26;
  const MB_W=476,MB_H=480,MB_R=12;
  const LX=28,RX=W-28-MB_W;

  // crown + label
  async function mascotLabel(label,cx,y){
    await drawIcon(ctx,'crown',32,cx-ctx.measureText(label).width/2-28,y-10,'#ffd700');
    ctx.font="600 26px 'Cinzel',serif";ctx.fillStyle='#ffd700';
    glow(ctx,'#c8960c',10);ctx.fillText(label,cx,y);noGlow(ctx);
  }
  await mascotLabel('Kak Taksaka',   LX+MB_W/2, ML_Y);
  await mascotLabel('Dokter Taksaka',RX+MB_W/2, ML_Y);

  function drawMascotBox(img,bx,by){
    rr(ctx,bx,by,MB_W,MB_H,MB_R);
    ctx.fillStyle='rgba(10,8,5,0.75)';ctx.fill();
    goldBorder(ctx,bx,by,MB_W,MB_H,MB_R,1.5);
    drawImgCover(ctx,img,bx,by,MB_W,MB_H,MB_R,0.05);
  }
  drawMascotBox(kakImg,LX,MB_Y);
  drawMascotBox(dokterImg,RX,MB_Y);

  // 8. SPEECH BUBBLES
  const BU_Y=MB_Y+MB_H+18;
  const BU_W=MB_W,BU_H=240;

  async function drawBubble(bx,by,title,msg,sign,bgCol){
    rr(ctx,bx,by,BU_W,BU_H,14);
    ctx.fillStyle=bgCol;ctx.fill();
    goldBorder(ctx,bx,by,BU_W,BU_H,14,1.5);

    // chat icon left of title
    const titleX=bx+BU_W/2;
    await drawIcon(ctx,'chat',26,titleX-ctx.measureText(title).width/2-24,by+28,'#ffd700');

    ctx.font="600 22px 'Cinzel',serif";ctx.fillStyle='#ffd700';
    glow(ctx,'#c8960c',8);
    ctx.fillText(title,titleX,by+34);noGlow(ctx);

    goldLine(ctx,bx+26,by+46,BU_W-52,0.38,1);

    ctx.font="400 22px 'Cormorant Garamond',serif";ctx.fillStyle='#d8d8d8';
    ctx.textBaseline='top';
    const lines=wrapText(ctx,msg,BU_W-72);
    const lh=30;
    lines.forEach((l,i)=>ctx.fillText(l,bx+BU_W/2,by+60+i*lh));
    ctx.textBaseline='alphabetic';

    ctx.font="italic 300 19px 'Cormorant Garamond',serif";ctx.fillStyle='#666';
    ctx.fillText(sign,bx+BU_W/2,by+BU_H-18);
  }

  await drawBubble(LX,BU_Y,'ucapan Kak Taksaka',   kakMsg,'– Kak Taksaka',   '#180404');
  await drawBubble(RX,BU_Y,'ucapan Dokter Taksaka',dokMsg,'– Dokter Taksaka','#001605');

  // 9. FOOTER BOX
  const FT_Y=BU_Y+BU_H+26;
  const FT_H=106;
  goldLine(ctx,44,FT_Y-4,W-88,0.28);
  rr(ctx,44,FT_Y,W-88,FT_H,10);
  ctx.fillStyle='rgba(10,8,4,0.65)';ctx.fill();
  goldBorder(ctx,44,FT_Y,W-88,FT_H,10,1.2);

  // calendar icon SVG
  await drawIcon(ctx,'calendar',44,92,FT_Y+FT_H/2,'#ffd700');

  ctx.font="600 28px 'Cinzel',serif";ctx.fillStyle='#ffd700';
  ctx.textAlign='left';
  ctx.fillText(ttl.toUpperCase(),142,FT_Y+44);

  ctx.save();ctx.strokeStyle='rgba(100,70,0,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(340,FT_Y+16);ctx.lineTo(340,FT_Y+FT_H-16);ctx.stroke();ctx.restore();

  ctx.font="italic 400 22px 'Cormorant Garamond',serif";ctx.fillStyle='#bcbcbc';
  ctx.fillText('Semoga panjang umur,',           358,FT_Y+40);
  ctx.fillText('sehat selalu, dan sukses terus!',358,FT_Y+70);

  // cake icon SVG
  await drawIcon(ctx,'cake',42,W-72,FT_Y+FT_H/2,'#ffd700');
  ctx.textAlign='center';

  // 10. FOOTER LOGO
  const LOGO_Y=FT_Y+FT_H+46;

  // star icons flanking footer logo
  await drawIcon(ctx,'star',28,W/2-190,LOGO_Y-12,'#c8960c');
  await drawIcon(ctx,'star',28,W/2+190,LOGO_Y-12,'#c8960c');

  ctx.font="700 26px 'Cinzel Decorative',serif";ctx.fillStyle='#c8960c';
  glow(ctx,'#c8960c',16);
  ctx.fillText('PAGASKA',W/2,LOGO_Y);noGlow(ctx);

  goldLine(ctx,PAD,H-56,W-PAD*2,1,3);
  goldLine(ctx,PAD,H-50,W-PAD*2,0.28,1);

  // show
  document.getElementById('placeholder').style.display='none';
  const cv=document.getElementById('poster-canvas');
  cv.style.display='block';cv.style.width='360px';
  document.getElementById('btnDownload').style.display='block';
}

function downloadPoster(){
  const canvas=document.getElementById('poster-canvas');
  const nama=document.getElementById('inputNama').value.trim()||'pagaska';
  const a=document.createElement('a');
  a.download=`pagaska-${nama.toLowerCase().replace(/\s+/g,'-')}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
}
</script>
</body>
</html>
