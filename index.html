<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PAGASKA Birthday Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #ffd700; --gold-mid: #c8960c; --gold-dark: #7a5500; --gold-deeper: #3d2900;
}
body {
  background: #0e0c0a;
  font-family: 'EB Garamond', serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 16px; gap: 32px;
}
.form-panel {
  width: 100%; max-width: 480px;
  background: #16120d; border: 1px solid var(--gold-dark);
  border-radius: 12px; padding: 28px;
  box-shadow: 0 0 40px rgba(200,150,12,0.07);
}
.form-panel h2 {
  font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
  color: var(--gold); text-align: center; letter-spacing: 4px; margin-bottom: 6px;
}
.form-panel .sub {
  text-align: center; font-size: 13px; color: #666;
  margin-bottom: 24px; font-style: italic;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1/-1; }
label {
  display: block; font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: 2px; color: var(--gold-mid); margin-bottom: 5px;
}
input {
  width: 100%; background: #0a0806; border: 1px solid #2e2000;
  border-radius: 6px; padding: 9px 13px;
  font-family: 'EB Garamond', serif; font-size: 15px; color: #ddd; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--gold-mid); }
input::placeholder { color: #333; font-style: italic; }
.photo-upload {
  position: relative; border: 2px dashed #2e2000; border-radius: 8px;
  padding: 18px; text-align: center; cursor: pointer; transition: border-color 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.photo-upload:hover { border-color: var(--gold-mid); }
.photo-upload input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-preview {
  width: 72px; height: 72px; border-radius: 6px; object-fit: cover;
  border: 1px solid var(--gold-dark); display: none;
}
.upload-label { font-size: 12px; color: #555; pointer-events: none; font-style: italic; }
.btn-generate {
  width: 100%;
  background: linear-gradient(135deg, #3d2900, #7a5500, #ffd700, #7a5500, #3d2900);
  background-size: 300% 300%; animation: shimmer 4s ease infinite;
  border: none; border-radius: 8px; padding: 13px;
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
  letter-spacing: 4px; color: #0a0600; cursor: pointer; margin-top: 18px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,215,0,0.2); }
@keyframes shimmer {
  0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; }
}
.btn-download {
  width: 100%; background: transparent; border: 1px solid var(--gold-dark);
  border-radius: 8px; padding: 10px;
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: var(--gold-mid); cursor: pointer; margin-top: 8px;
  transition: background 0.2s; display: none;
}
.btn-download:hover { background: rgba(200,150,12,0.08); color: var(--gold); }
.poster-wrap { position: relative; }
#poster-canvas {
  display: none; max-width: 100%;
  box-shadow: 0 20px 80px rgba(0,0,0,0.9), 0 0 50px rgba(200,150,12,0.05);
}
.placeholder {
  width: 360px; max-width: 100%; aspect-ratio: 9/16;
  background: #0a0806; border: 1px solid #1a1510; border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
}
.placeholder span { font-size: 40px; opacity: 0.2; }
.placeholder p { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: #333; }
</style>
</head>
<body>

<div class="form-panel">
  <h2>✦ PAGASKA ✦</h2>
  <div class="sub">Generator Kartu Ulang Tahun</div>
  <div class="form-grid">
    <div class="full">
      <label>FOTO ANGGOTA</label>
      <div class="photo-upload">
        <input type="file" id="photoInput" accept="image/*">
        <img class="upload-preview" id="photoPreview" alt="">
        <div class="upload-label" id="uploadLabel">📷 Klik untuk upload foto</div>
      </div>
    </div>
    <div class="full">
      <label>NAMA LENGKAP</label>
      <input type="text" id="inputNama" placeholder="cth. Rizky Indra Permana" maxlength="30">
    </div>
    <div>
      <label>JABATAN</label>
      <input type="text" id="inputJabatan" placeholder="cth. Ketua Umum" maxlength="22">
    </div>
    <div>
      <label>GENERASI</label>
      <input type="text" id="inputGenerasi" placeholder="cth. 2" maxlength="5">
    </div>
    <div class="full">
      <label>TANGGAL LAHIR</label>
      <input type="text" id="inputTTL" placeholder="cth. 8 Juni 2007" maxlength="20">
    </div>
  </div>
  <button class="btn-generate" onclick="generatePoster()">GENERATE POSTER</button>
  <button class="btn-download" id="btnDownload" onclick="downloadPoster()">↓ DOWNLOAD PNG</button>
</div>

<div class="poster-wrap">
  <div class="placeholder" id="placeholder">
    <span>🎂</span>
    <p>PREVIEW POSTER</p>
  </div>
  <canvas id="poster-canvas" width="1080" height="1920"></canvas>
</div>

<script>
// ─── constants ────────────────────────────────────────────
const W = 1080, H = 1920;
let memberPhoto = null, kakImg = null, dokterImg = null;

// ─── load mascots ─────────────────────────────────────────
function loadImg(src) {
  return new Promise(res => {
    const i = new Image(); i.crossOrigin = 'anonymous';
    i.onload = () => res(i); i.onerror = () => res(null); i.src = src;
  });
}
Promise.all([loadImg('kak.png'), loadImg('dokter.png')])
  .then(([k, d]) => { kakImg = k; dokterImg = d; });

// ─── photo upload ─────────────────────────────────────────
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      memberPhoto = img;
      const prev = document.getElementById('photoPreview');
      prev.src = ev.target.result; prev.style.display = 'block';
      document.getElementById('uploadLabel').textContent = file.name;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ─── canvas helpers ───────────────────────────────────────
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function goldGrad(ctx, x1, y1, x2, y2) {
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0,    '#2e1a00');
  g.addColorStop(0.25, '#c8960c');
  g.addColorStop(0.5,  '#fffacd');
  g.addColorStop(0.75, '#ffd700');
  g.addColorStop(1,    '#2e1a00');
  return g;
}

function goldLine(ctx, x, y, w, alpha=1, h=2.5) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = goldGrad(ctx, x, y, x+w, y);
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function goldBorder(ctx, x, y, w, h, r, lw=2) {
  ctx.save();
  ctx.strokeStyle = goldGrad(ctx, x, y, x+w, y+h);
  ctx.lineWidth = lw;
  rr(ctx, x, y, w, h, r); ctx.stroke();
  ctx.restore();
}

function glow(ctx, col, blur) { ctx.shadowColor = col; ctx.shadowBlur = blur; }
function noGlow(ctx)           { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

// cover-fit an image into a box, clipped to rounded rect
function drawImgCover(ctx, img, x, y, w, h, r, posY=0.15) {
  ctx.save();
  rr(ctx, x, y, w, h, r); ctx.clip();
  if (img) {
    const iR = img.width / img.height, bR = w / h;
    let dw, dh, dx, dy;
    if (iR > bR) { dh = h; dw = dh * iR; dx = x+(w-dw)/2; dy = y; }
    else         { dw = w; dh = dw/iR;   dx = x; dy = y+(h-dh)*posY; }
    ctx.drawImage(img, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = '#1a1208'; ctx.fillRect(x, y, w, h);
    ctx.font = '80px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#3d2900'; ctx.fillText('?', x+w/2, y+h/2);
  }
  ctx.restore();
}

// wrap text into lines that fit maxW
function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = []; let cur = '';
  for (const w of words) {
    const test = cur ? cur+' '+w : w;
    if (ctx.measureText(test).width > maxW) { if (cur) lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

// AI greeting stubs — replace with real Gemini calls
function getKakGreeting(nama, jabatan, gen) {
  return `Selamat ulang tahun, ${nama}! Semoga langkahmu di Pagaska selalu mantap, membawa perubahan positif, dan menjadi teladan bagi generasi penerus.`;
}
function getDokterGreeting(nama, jabatan, gen) {
  return `Selamat ulang tahun, ${nama}. Semoga selalu diberi kesehatan, kelancaran dalam setiap rencana, dan keberkahan di setiap usaha.`;
}

// ─── MAIN DRAW ────────────────────────────────────────────
async function generatePoster() {
  const nama     = document.getElementById('inputNama').value.trim()     || 'Nama Lengkap';
  const jabatan  = document.getElementById('inputJabatan').value.trim()  || 'Jabatan';
  const generasi = document.getElementById('inputGenerasi').value.trim() || '-';
  const ttl      = document.getElementById('inputTTL').value.trim()      || '—';
  const kakMsg    = getKakGreeting(nama, jabatan, generasi);
  const dokterMsg = getDokterGreeting(nama, jabatan, generasi);

  const canvas = document.getElementById('poster-canvas');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // ── 1. BACKGROUND ────────────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#07070d');
  bg.addColorStop(0.42, '#130500');
  bg.addColorStop(1,    '#060010');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  function ambient(cx, cy, r, col, a) {
    const rg = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0, col); rg.addColorStop(1,'transparent');
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  ambient(160,  380, 420, '#ff1100', 0.025);
  ambient(920,  820, 340, '#ffd700', 0.020);
  ambient(540, 1400, 560, '#6b0000', 0.030);

  // ── 2. TOP BORDER ────────────────────────────────────────
  const PAD = 44;
  goldLine(ctx, PAD, 42, W-PAD*2, 1,   3);
  goldLine(ctx, PAD, 48, W-PAD*2, 0.28, 1);

  // ── 3. HEADER ────────────────────────────────────────────
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';

  // ✦ PAGASKA ✦
  ctx.font = "700 36px 'Cinzel Decorative', serif";
  ctx.fillStyle = '#c8960c';
  glow(ctx, '#c8960c', 16);
  ctx.fillText('✦  PAGASKA  ✦', W/2, 110);
  noGlow(ctx);

  // Paskibra Gala Taksaka
  ctx.font = "400 23px 'EB Garamond', serif";
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Paskibra Gala Taksaka', W/2, 148);

  // Selamat Ulang Tahun
  ctx.font = "700 34px 'Cinzel', serif";
  ctx.fillStyle = '#ffd700';
  glow(ctx, '#ffd700', 20);
  ctx.fillText('👑  Selamat Ulang Tahun  👑', W/2, 196);
  noGlow(ctx);

  goldLine(ctx, 200, 214, W-400, 0.45);

  // ── 4. MEMBER PHOTO ──────────────────────────────────────
  const FW = 420, FH = 460, FR = 22;
  const FX = (W-FW)/2, FY = 232;

  drawImgCover(ctx, memberPhoto, FX, FY, FW, FH, FR, 0.1);

  // Gold border around photo
  const BP = 11, BR = FR+7;
  ctx.save();
  glow(ctx, '#c8960c', 18);
  ctx.strokeStyle = goldGrad(ctx, FX-BP, FY-BP, FX+FW+BP, FY+FH+BP);
  ctx.lineWidth = 3.5;
  rr(ctx, FX-BP, FY-BP, FW+BP*2, FH+BP*2, BR); ctx.stroke();
  noGlow(ctx);
  ctx.strokeStyle = 'rgba(255,250,205,0.22)'; ctx.lineWidth = 1;
  rr(ctx, FX-BP+5, FY-BP+5, FW+BP*2-10, FH+BP*2-10, BR-4); ctx.stroke();
  ctx.restore();

  const AFTER_FOTO = FY + FH + BP + 4; // ~707

  // ── 5. GENERASI BADGE ────────────────────────────────────
  ctx.font = "italic 400 24px 'EB Garamond', serif";
  ctx.fillStyle = '#888888';
  ctx.fillText('Generasi: ' + generasi, W/2, AFTER_FOTO + 34);
  goldLine(ctx, 220, AFTER_FOTO + 44, W-440, 0.35);

  // ── 6. NAME BOX ──────────────────────────────────────────
  const NB_Y = AFTER_FOTO + 62;
  const NB_H = 160, NB_X = 56, NB_W = W-112, NB_R = 10;

  rr(ctx, NB_X, NB_Y, NB_W, NB_H, NB_R);
  ctx.fillStyle = 'rgba(8,6,4,0.85)'; ctx.fill();
  goldBorder(ctx, NB_X, NB_Y, NB_W, NB_H, NB_R, 2);
  ctx.save(); ctx.strokeStyle = 'rgba(90,60,0,0.28)'; ctx.lineWidth=1;
  rr(ctx, NB_X+6, NB_Y+6, NB_W-12, NB_H-12, NB_R-3); ctx.stroke(); ctx.restore();

  // small "NAMA LENGKAP" label
  ctx.font = "600 16px 'Cinzel', serif";
  ctx.fillStyle = '#5a3d00';
  ctx.fillText('NAMA LENGKAP', W/2, NB_Y + 30);

  // auto-fit name font
  let nfs = 66;
  ctx.font = `900 ${nfs}px 'Cinzel', serif`;
  while (ctx.measureText(nama.toUpperCase()).width > NB_W - 80 && nfs > 28) {
    nfs -= 2; ctx.font = `900 ${nfs}px 'Cinzel', serif`;
  }
  const nameGrad = ctx.createLinearGradient(NB_X+40, 0, NB_X+NB_W-40, 0);
  nameGrad.addColorStop(0,   '#cc1111');
  nameGrad.addColorStop(0.5, '#ffd700');
  nameGrad.addColorStop(1,   '#cc1111');
  ctx.fillStyle = nameGrad;
  glow(ctx, '#aa1111', 12);
  ctx.fillText(nama.toUpperCase(), W/2, NB_Y + 92);
  noGlow(ctx);

  goldLine(ctx, NB_X+50, NB_Y+106, NB_W-100, 0.3, 1);

  // Jabatan label
  ctx.font = "400 20px 'EB Garamond', serif";
  ctx.fillStyle = '#777'; ctx.fillText('Jabatan', W/2, NB_Y + 126);

  // Jabatan value — auto-fit
  let jfs = 32;
  ctx.font = `600 ${jfs}px 'Cinzel', serif`;
  while (ctx.measureText(jabatan.toUpperCase()).width > NB_W - 80 && jfs > 18) {
    jfs -= 2; ctx.font = `600 ${jfs}px 'Cinzel', serif`;
  }
  ctx.fillStyle = '#ffffff';
  ctx.fillText(jabatan.toUpperCase(), W/2, NB_Y + 155);

  // ── 7. ICON ROW ──────────────────────────────────────────
  const IC_Y = NB_Y + NB_H + 58;
  const icons = ['🏃','🔥','🛡️','👥','📖'];
  ctx.font = '46px serif'; ctx.textBaseline = 'middle';
  const iSp = 84, iTot = icons.length * iSp;
  let ix = (W - iTot) / 2 + iSp/2;
  icons.forEach(ic => { ctx.fillText(ic, ix, IC_Y); ix += iSp; });
  ctx.textBaseline = 'alphabetic';

  goldLine(ctx, 44, IC_Y + 40, W-88, 0.32);

  // ── 8. MASCOTS ───────────────────────────────────────────
  const ML_Y  = IC_Y + 74;   // mascot label Y
  const MB_Y  = ML_Y + 24;   // mascot box top
  const MB_W  = 476, MB_H = 480, MB_R = 12;
  const LX = 28, RX = W - 28 - MB_W;

  // labels
  ctx.font = "600 26px 'Cinzel', serif"; ctx.fillStyle = '#ffd700';
  glow(ctx, '#c8960c', 10);
  ctx.fillText('👑  Kak Taksaka',    LX + MB_W/2, ML_Y);
  ctx.fillText('👑  Dokter Taksaka', RX + MB_W/2, ML_Y);
  noGlow(ctx);

  function drawMascotBox(img, bx, by) {
    rr(ctx, bx, by, MB_W, MB_H, MB_R);
    ctx.fillStyle = 'rgba(10,8,5,0.75)'; ctx.fill();
    goldBorder(ctx, bx, by, MB_W, MB_H, MB_R, 1.5);
    drawImgCover(ctx, img, bx, by, MB_W, MB_H, MB_R, 0.05);
  }
  drawMascotBox(kakImg,    LX, MB_Y);
  drawMascotBox(dokterImg, RX, MB_Y);

  // ── 9. SPEECH BUBBLES ────────────────────────────────────
  const BU_Y = MB_Y + MB_H + 18;
  const BU_W = MB_W, BU_H = 236;

  function drawBubble(bx, by, title, msg, sign, bgCol) {
    rr(ctx, bx, by, BU_W, BU_H, 14);
    ctx.fillStyle = bgCol; ctx.fill();
    goldBorder(ctx, bx, by, BU_W, BU_H, 14, 1.5);

    // title
    ctx.font = "600 24px 'Cinzel', serif"; ctx.fillStyle = '#ffd700';
    glow(ctx, '#c8960c', 8);
    ctx.fillText(title, bx+BU_W/2, by+32); noGlow(ctx);

    goldLine(ctx, bx+26, by+44, BU_W-52, 0.38, 1);

    // message lines
    ctx.font = "400 22px 'Cormorant Garamond', serif"; ctx.fillStyle = '#d8d8d8';
    ctx.textBaseline = 'top';
    const lines = wrapText(ctx, msg, BU_W - 72);
    const lh = 30;
    lines.forEach((l, i) => ctx.fillText(l, bx+BU_W/2, by+58+i*lh));
    ctx.textBaseline = 'alphabetic';

    // sign
    ctx.font = "italic 300 19px 'Cormorant Garamond', serif"; ctx.fillStyle = '#666';
    ctx.fillText(sign, bx+BU_W/2, by+BU_H-20);
  }

  drawBubble(LX, BU_Y, 'ucapan Kak Taksaka',    kakMsg,    '– Kak Taksaka',    '#180404');
  drawBubble(RX, BU_Y, 'ucapan Dokter Taksaka', dokterMsg, '– Dokter Taksaka', '#001605');

  // ── 10. FOOTER BOX ───────────────────────────────────────
  const FT_Y = BU_Y + BU_H + 26;
  const FT_H = 104;
  goldLine(ctx, 44, FT_Y - 4, W-88, 0.28);
  rr(ctx, 44, FT_Y, W-88, FT_H, 10);
  ctx.fillStyle = 'rgba(10,8,4,0.65)'; ctx.fill();
  goldBorder(ctx, 44, FT_Y, W-88, FT_H, 10, 1.2);

  // calendar icon
  ctx.font = '40px serif'; ctx.textBaseline = 'middle';
  ctx.fillText('📅', 88, FT_Y + FT_H/2);
  ctx.textBaseline = 'alphabetic';

  // TTL text
  ctx.font = "600 28px 'Cinzel', serif"; ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'left';
  ctx.fillText(ttl, 142, FT_Y + 44);

  // vertical sep
  ctx.save(); ctx.strokeStyle = 'rgba(100,70,0,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(340, FT_Y+16); ctx.lineTo(340, FT_Y+FT_H-16); ctx.stroke();
  ctx.restore();

  // quote text
  ctx.font = "italic 400 22px 'Cormorant Garamond', serif"; ctx.fillStyle = '#bcbcbc';
  ctx.fillText('Semoga panjang umur,',            358, FT_Y + 40);
  ctx.fillText('sehat selalu, dan sukses terus!', 358, FT_Y + 70);

  // cake icon
  ctx.font = '38px serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText('🎂', W-68, FT_Y + FT_H/2);
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'center';

  // ── 11. FOOTER LOGO ──────────────────────────────────────
  const LOGO_Y = FT_Y + FT_H + 44;
  ctx.font = "700 26px 'Cinzel Decorative', serif"; ctx.fillStyle = '#c8960c';
  glow(ctx, '#c8960c', 16);
  ctx.fillText('✦  PAGASKA  ✦', W/2, LOGO_Y);
  noGlow(ctx);

  // bottom border
  goldLine(ctx, PAD, H-56, W-PAD*2, 1,   3);
  goldLine(ctx, PAD, H-50, W-PAD*2, 0.28, 1);

  // ── show ─────────────────────────────────────────────────
  document.getElementById('placeholder').style.display = 'none';
  const cv = document.getElementById('poster-canvas');
  cv.style.display = 'block';
  cv.style.width   = '360px';
  document.getElementById('btnDownload').style.display = 'block';
}

function downloadPoster() {
  const canvas = document.getElementById('poster-canvas');
  const nama   = document.getElementById('inputNama').value.trim() || 'pagaska';
  const a = document.createElement('a');
  a.download = `pagaska-${nama.toLowerCase().replace(/\s+/g,'-')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
